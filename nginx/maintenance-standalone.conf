# Minimal nginx: serve only the maintenance page on :80 (used by docker-compose.maintenance.yml).
events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  text/html;
    sendfile      on;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        location / {
            return 503;
        }

        error_page 503 /index.html;
        location = /index.html {
            root /usr/share/nginx/html;
        }
    }
}
