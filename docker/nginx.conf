events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json;

    # ── Limite upload fichiers vidéo (50 GB + marge) ──
    client_max_body_size    55G;
    client_body_timeout     3600s;
    client_body_buffer_size 1m;

    upstream api {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Décommenter pour forcer HTTPS en production :
        # return 301 https://$host$request_uri;

        # ── Frontend statique ──────────────────────────
        root  /usr/share/nginx/html;
        index login.html;

        location / {
            try_files $uri $uri/ /login.html;
        }

        # ── API (proxy vers FastAPI) ───────────────────
        location /api/ {
            proxy_pass              http://api;
            proxy_http_version      1.1;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_set_header        Connection        "";

            # Upload de gros fichiers
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
            proxy_connect_timeout   60s;

            # Streaming vidéo
            proxy_buffering         off;
        }

        # ── En-têtes de sécurité ───────────────────────
        add_header X-Frame-Options        DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection       "1; mode=block";
        add_header Referrer-Policy        strict-origin-when-cross-origin;
    }

    # ── HTTPS — décommenter en production ─────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name redwoodplus.example.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     client_max_body_size 55G;
    #     # ... même config location que le bloc HTTP ci-dessus
    # }
}
