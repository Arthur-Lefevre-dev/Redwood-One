services:

  postgres:
    image: postgres:16-alpine
    container_name: redwood_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-redwood}
      POSTGRES_USER:     ${POSTGRES_USER:-redwood}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redwood}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - redwood_net

  redis:
    image: redis:7-alpine
    container_name: redwood_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - redwood_net

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: redwood_api
    restart: unless-stopped
    env_file: .env
    volumes:
      - tmp_data:/tmp/redwood
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)",
        ]
      interval: 10s
      timeout: 6s
      retries: 5
      start_period: 90s
    networks:
      - redwood_net

  # Celery consumer(s). No fixed container_name so you can run several in parallel, e.g.:
  #   docker compose up -d --scale worker=10
  # Tune per-process parallelism with CELERY_WORKER_CONCURRENCY in .env (default 4).
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - tmp_data:/tmp/redwood
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - redwood_net
    # GPU AMD (Linux hôte) : exposer le nœud render pour ffmpeg VAAPI/AMF + détection lspci/vainfo
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    # Sur VPS avec NVIDIA + nvidia-container-toolkit, décommenter :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: redwood_beat
    restart: unless-stopped
    env_file: .env
    command: celery -A worker.tasks beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - redwood_net

  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: redwood_flower
    restart: unless-stopped
    env_file: .env
    command: celery -A worker.tasks flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    networks:
      - redwood_net

  nginx:
    image: nginx:alpine
    container_name: redwood_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # On VPS with HTTPS, swap nginx.conf for nginx.production.conf (same mount target).
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # maintenance.html lives under frontend/ (same ro mount — do not add a second file mount here).
      - ../frontend:/usr/share/nginx/html:ro
      - ../nginx/certs:/etc/nginx/certs:ro
      - ../nginx/acme-webroot:/var/www/certbot:ro
    # Start nginx as soon as the API container exists so port 80 answers (maintenance page on upstream errors).
    depends_on:
      - api
    networks:
      - redwood_net

volumes:
  postgres_data:
  redis_data:
  tmp_data:

networks:
  redwood_net:
    driver: bridge
