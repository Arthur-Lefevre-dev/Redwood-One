<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Inscription — Redwood Plus</title>
  <link rel="stylesheet" href="/css/redwood-auth.css" />
</head>
<body>
  <div class="auth-page-wrap">
    <div id="auth-announcements" class="auth-announcements-host" hidden aria-live="polite"></div>
    <div class="card">
    <h1>Créer un compte</h1>
    <p class="sub">Un code d’invitation fourni par un administrateur est requis (sauf si l’instance est en mode ouvert).</p>
    <form id="f">
      <label for="code">Code d’invitation</label>
      <input id="code" name="invite" autocomplete="off" placeholder="Ex. A1B2C3D4E5" />
      <label for="u">Identifiant</label>
      <input id="u" name="username" autocomplete="username" required minlength="2" />
      <label for="e">E-mail</label>
      <input id="e" name="email" type="email" autocomplete="email" required />
      <label for="p">Mot de passe</label>
      <input id="p" name="password" type="password" autocomplete="new-password" required minlength="12" maxlength="128" />
      <label for="p2">Confirmer le mot de passe</label>
      <input id="p2" name="password_confirm" type="password" autocomplete="new-password" required minlength="12" maxlength="128" />
      <p class="sub" style="margin-top:-6px;margin-bottom:12px;font-size:13px;opacity:.9">Au moins 12 caractères, sans espace : une minuscule, une majuscule, un chiffre et un symbole (! # @ …).</p>
      <button type="submit">S’inscrire</button>
    </form>
    <p class="err" id="err"></p>
    <p class="ok" id="ok">Compte créé. Redirection…</p>
    <p class="links"><a href="/login.html">Déjà un compte ? Connexion</a></p>
    </div>
  </div>
  <script>
    (function () {
      var host = document.getElementById('auth-announcements');
      if (!host) return;
      fetch('/api/public/auth-page-announcements?placement=register', { credentials: 'omit' })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function (data) {
          var items = (data && data.items) || [];
          if (!items.length) return;
          host.removeAttribute('hidden');
          items.forEach(function (item) {
            var box = document.createElement('div');
            box.className = 'auth-announcement';
            box.setAttribute('role', 'status');
            if (item.title) {
              var h = document.createElement('div');
              h.className = 'auth-announcement-title';
              h.textContent = item.title;
              box.appendChild(h);
            }
            var p = document.createElement('div');
            p.className = 'auth-announcement-body';
            p.textContent = item.body || '';
            box.appendChild(p);
            host.appendChild(box);
          });
        })
        .catch(function () {});
    })();
  </script>
  <script>
    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('err').style.display = 'none';
      document.getElementById('ok').style.display = 'none';
      const code = document.getElementById('code').value.trim();
      const pw = document.getElementById('p').value;
      const pw2 = document.getElementById('p2').value;
      if (pw !== pw2) {
        const errEl = document.getElementById('err');
        errEl.textContent = 'Les mots de passe ne correspondent pas.';
        errEl.style.display = 'block';
        return;
      }
      const body = {
        username: document.getElementById('u').value.trim(),
        email: document.getElementById('e').value.trim(),
        password: pw,
        password_confirm: pw2,
        invite_code: code || null,
      };
      const r = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) {
        let msg = 'Inscription refusée';
        const d = j.detail;
        if (typeof d === 'string') msg = d;
        else if (Array.isArray(d)) msg = d.map((x) => x.msg || x).join(' ');
        document.getElementById('err').textContent = msg;
        document.getElementById('err').style.display = 'block';
        return;
      }
      document.getElementById('ok').style.display = 'block';
      setTimeout(() => { window.location.href = '/login.html'; }, 800);
    });
  </script>
  <script src="/js/auth-ads-loader.js"></script>
  <script src="/watch/js/watch-adblock-notice.js"></script>
</body>
</html>
