<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inscription — Redwood Plus</title>
  <style>
    :root { --bg:#0a0a0a; --card:#141414; --border:#2a2a2a; --text:#f5f5f5; --muted:#a3a3a3; --accent:#8B2500; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); margin:0; min-height:100vh; }
    .auth-page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px 16px;
    }
    .auth-announcements-host[hidden] { display: none !important; }
    .auth-announcements-host {
      width: min(420px, 100%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .auth-announcement {
      border: 1px solid #854d0e;
      background: rgba(180, 83, 9, 0.14);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.88rem;
      line-height: 1.45;
      color: #fef3c7;
    }
    .auth-announcement-title { font-weight: 600; margin-bottom: 6px; color: #fde68a; }
    .auth-announcement-body { white-space: pre-wrap; word-break: break-word; }
    .card { width:min(420px,100%); background:var(--card); border:1px solid var(--border); border-radius:12px; padding:28px; }
    h1 { font-size:1.25rem; margin-bottom:4px; }
    .sub { color:var(--muted); font-size:.85rem; margin-bottom:22px; line-height:1.5; }
    label { display:block; font-size:.8rem; color:var(--muted); margin-bottom:6px; }
    input { width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:#0f0f0f; color:var(--text); margin-bottom:14px; }
    button { width:100%; padding:10px; border:none; border-radius:8px; background:var(--accent); color:#fff; font-weight:600; cursor:pointer; margin-top:6px; }
    .err { color:#f87171; font-size:.85rem; margin-top:10px; display:none; }
    .ok { color:#86efac; font-size:.85rem; margin-top:10px; display:none; }
    .links { margin-top:18px; font-size:.85rem; color:var(--muted); text-align:center; }
    a { color:#fca5a5; }
  </style>
</head>
<body>
  <div class="auth-page-wrap">
    <div id="auth-announcements" class="auth-announcements-host" hidden aria-live="polite"></div>
    <div class="card">
    <h1>Créer un compte</h1>
    <p class="sub">Un code d’invitation fourni par un administrateur est requis (sauf si l’instance est en mode ouvert).</p>
    <form id="f">
      <label for="code">Code d’invitation</label>
      <input id="code" name="invite" autocomplete="off" placeholder="Ex. A1B2C3D4E5" />
      <label for="u">Identifiant</label>
      <input id="u" name="username" autocomplete="username" required minlength="2" />
      <label for="e">E-mail</label>
      <input id="e" name="email" type="email" autocomplete="email" required />
      <label for="p">Mot de passe</label>
      <input id="p" name="password" type="password" autocomplete="new-password" required minlength="12" maxlength="128" />
      <label for="p2">Confirmer le mot de passe</label>
      <input id="p2" name="password_confirm" type="password" autocomplete="new-password" required minlength="12" maxlength="128" />
      <p class="sub" style="margin-top:-6px;margin-bottom:12px;font-size:13px;opacity:.9">Au moins 12 caractères, sans espace : une minuscule, une majuscule, un chiffre et un symbole (! # @ …).</p>
      <button type="submit">S’inscrire</button>
    </form>
    <p class="err" id="err"></p>
    <p class="ok" id="ok">Compte créé. Redirection…</p>
    <p class="links"><a href="/login.html">Déjà un compte ? Connexion</a></p>
    </div>
  </div>
  <script>
    (function () {
      var host = document.getElementById('auth-announcements');
      if (!host) return;
      fetch('/api/public/auth-page-announcements?placement=register', { credentials: 'omit' })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function (data) {
          var items = (data && data.items) || [];
          if (!items.length) return;
          host.removeAttribute('hidden');
          items.forEach(function (item) {
            var box = document.createElement('div');
            box.className = 'auth-announcement';
            box.setAttribute('role', 'status');
            if (item.title) {
              var h = document.createElement('div');
              h.className = 'auth-announcement-title';
              h.textContent = item.title;
              box.appendChild(h);
            }
            var p = document.createElement('div');
            p.className = 'auth-announcement-body';
            p.textContent = item.body || '';
            box.appendChild(p);
            host.appendChild(box);
          });
        })
        .catch(function () {});
    })();
  </script>
  <script>
    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('err').style.display = 'none';
      document.getElementById('ok').style.display = 'none';
      const code = document.getElementById('code').value.trim();
      const pw = document.getElementById('p').value;
      const pw2 = document.getElementById('p2').value;
      if (pw !== pw2) {
        const errEl = document.getElementById('err');
        errEl.textContent = 'Les mots de passe ne correspondent pas.';
        errEl.style.display = 'block';
        return;
      }
      const body = {
        username: document.getElementById('u').value.trim(),
        email: document.getElementById('e').value.trim(),
        password: pw,
        password_confirm: pw2,
        invite_code: code || null,
      };
      const r = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) {
        let msg = 'Inscription refusée';
        const d = j.detail;
        if (typeof d === 'string') msg = d;
        else if (Array.isArray(d)) msg = d.map((x) => x.msg || x).join(' ');
        document.getElementById('err').textContent = msg;
        document.getElementById('err').style.display = 'block';
        return;
      }
      document.getElementById('ok').style.display = 'block';
      setTimeout(() => { window.location.href = '/login.html'; }, 800);
    });
  </script>
  <script src="/js/auth-ads-loader.js"></script>
</body>
</html>
