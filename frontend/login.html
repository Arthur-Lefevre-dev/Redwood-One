<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Connexion — Redwood Plus</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --accent: #8B2500;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      margin: 0;
    }
    .auth-page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px 16px;
    }
    .auth-announcements-host[hidden] { display: none !important; }
    .auth-announcements-host {
      width: min(400px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .auth-announcement {
      border: 1px solid #854d0e;
      background: rgba(180, 83, 9, 0.14);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.88rem;
      line-height: 1.45;
      color: #fef3c7;
    }
    .auth-announcement-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: #fde68a;
    }
    .auth-announcement-body { white-space: pre-wrap; word-break: break-word; }
    .card {
      width: min(400px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }
    h1 { font-size: 1.25rem; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 22px; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0f0f0f;
      color: var(--text);
      margin-bottom: 14px;
    }
    .pass-row { margin-bottom: 14px; }
    .pass-row input { margin-bottom: 0; }
    .pass-field {
      position: relative;
      width: 100%;
    }
    .pass-field input {
      width: 100%;
      padding: 10px 44px 10px 12px;
    }
    button[type="submit"] {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
    }
    button[type="submit"]:hover { filter: brightness(1.08); }
    .btn-show-pass {
      position: absolute;
      right: 2px;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
    }
    .btn-show-pass:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .btn-show-pass .icon-eye-off { display: none; }
    .btn-show-pass.is-revealed .icon-eye { display: none; }
    .btn-show-pass.is-revealed .icon-eye-off { display: block; }
    .err { color: #f87171; font-size: 0.85rem; margin-top: 10px; display: none; }
    .links { margin-top: 18px; font-size: 0.85rem; color: var(--muted); text-align: center; }
    a { color: #fca5a5; }
  </style>
</head>
<body>
  <div class="auth-page-wrap">
    <div id="auth-announcements" class="auth-announcements-host" hidden aria-live="polite"></div>
    <div class="card">
    <h1>Espace spectateur</h1>
    <p class="sub">Connexion pour regarder le catalogue</p>
    <form id="f">
      <label for="u">Identifiant</label>
      <input id="u" name="username" autocomplete="username" required />
      <div class="pass-row">
        <label for="p">Mot de passe</label>
        <div class="pass-field">
          <input id="p" name="password" type="password" autocomplete="current-password" required />
          <button type="button" class="btn-show-pass" id="btn-show-pass" aria-pressed="false" aria-label="Afficher le mot de passe">
            <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit">Se connecter</button>
    </form>
    <p class="err" id="err"></p>
    <p class="links">
      <a href="/register.html">Créer un compte</a>
    </p>
    </div>
  </div>
  <script>
    (function () {
      const host = document.getElementById('auth-announcements');
      if (!host) return;
      fetch('/api/public/auth-page-announcements?placement=login', { credentials: 'omit' })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function (data) {
          var items = (data && data.items) || [];
          if (!items.length) return;
          host.removeAttribute('hidden');
          items.forEach(function (item) {
            var box = document.createElement('div');
            box.className = 'auth-announcement';
            box.setAttribute('role', 'status');
            if (item.title) {
              var h = document.createElement('div');
              h.className = 'auth-announcement-title';
              h.textContent = item.title;
              box.appendChild(h);
            }
            var p = document.createElement('div');
            p.className = 'auth-announcement-body';
            p.textContent = item.body || '';
            box.appendChild(p);
            host.appendChild(box);
          });
        })
        .catch(function () {});
    })();
  </script>
  <script>
    (function () {
      const inp = document.getElementById('p');
      const btn = document.getElementById('btn-show-pass');
      btn.addEventListener('click', () => {
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        btn.classList.toggle('is-revealed', show);
        btn.setAttribute('aria-pressed', show ? 'true' : 'false');
        btn.setAttribute('aria-label', show ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
      });
    })();
    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('err');
      err.style.display = 'none';
      const body = {
        username: document.getElementById('u').value.trim(),
        password: document.getElementById('p').value,
      };
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        let j = null;
        try {
          j = await r.json();
        } catch (_) {}
        const d = j && j.detail;
        const inactive =
          d &&
          typeof d === 'object' &&
          !Array.isArray(d) &&
          d.code === 'account_inactive';
        if (inactive) {
          const u = new URL('/compte-desactive.html', window.location.origin);
          if (d.deactivated_at) u.searchParams.set('deactivated_at', d.deactivated_at);
          window.location.href = u.pathname + u.search;
          return;
        }
        if (r.status === 429) {
          err.textContent = 'Trop de tentatives. Patientez une minute puis réessayez.';
        } else {
          let msg = 'Identifiants invalides';
          if (d) msg = typeof d === 'string' ? d : msg;
          err.textContent = msg;
        }
        err.style.display = 'block';
        return;
      }
      let j;
      try {
        j = await r.json();
      } catch (_) {
        err.textContent = 'Réponse serveur invalide (vérifiez les logs API / la base de données).';
        err.style.display = 'block';
        return;
      }
      window.location.href = '/watch/';
    });
  </script>
  <script src="/js/auth-ads-loader.js"></script>
  <script src="/watch/js/watch-adblock-notice.js"></script>
</body>
</html>
