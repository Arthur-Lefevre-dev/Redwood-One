<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion — Redwood Plus</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --accent: #8B2500;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(400px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }
    h1 { font-size: 1.25rem; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 22px; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0f0f0f;
      color: var(--text);
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
    }
    button:hover { filter: brightness(1.08); }
    .err { color: #f87171; font-size: 0.85rem; margin-top: 10px; display: none; }
    .links { margin-top: 18px; font-size: 0.85rem; color: var(--muted); text-align: center; }
    a { color: #fca5a5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Espace spectateur</h1>
    <p class="sub">Connexion pour regarder le catalogue</p>
    <form id="f">
      <label for="u">Identifiant</label>
      <input id="u" name="username" autocomplete="username" required />
      <label for="p">Mot de passe</label>
      <input id="p" name="password" type="password" autocomplete="current-password" required />
      <button type="submit">Se connecter</button>
    </form>
    <p class="err" id="err"></p>
    <p class="links">
      <a href="/register.html">Créer un compte</a>
      · <a href="/login-admin.html">Administration</a>
    </p>
  </div>
  <script>
    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('err');
      err.style.display = 'none';
      const body = {
        username: document.getElementById('u').value.trim(),
        password: document.getElementById('p').value,
      };
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        if (r.status === 429) {
          err.textContent = 'Trop de tentatives. Patientez une minute puis réessayez.';
        } else {
          let msg = 'Identifiants invalides';
          try {
            const j = await r.json();
            if (j.detail) msg = typeof j.detail === 'string' ? j.detail : msg;
          } catch (_) {}
          err.textContent = msg;
        }
        err.style.display = 'block';
        return;
      }
      const j = await r.json();
      if (j.role === 'admin') {
        window.location.href = '/login-admin.html';
      } else {
        window.location.href = '/watch/';
      }
    });
  </script>
</body>
</html>
