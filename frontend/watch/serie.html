<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Séries — Redwood Plus</title>
  <style>
    :root { --bg:#0a0a0a; --accent:#8B2500; --text:#f5f5f5; --muted:#a3a3a3; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid #222;flex-wrap:wrap;gap:12px}
    a.brand,.brand{font-weight:800;color:var(--accent);text-decoration:none;font-size:clamp(1.35rem,2.5vw,1.85rem)}
    a.brand:hover{color:#fca5a5}
    .nav-search{flex:1;max-width:360px;padding:9px 14px;border-radius:999px;border:1px solid #333;background:#111;color:#fff;font-size:14px}
    .nav-search::placeholder{color:#666}
    nav a{color:var(--muted);text-decoration:none;margin-left:18px;font-size:14px}
    nav a:hover{color:#fff}
    main{padding:24px 28px 48px;max-width:960px;margin:0 auto}
    h1{font-size:1.35rem;margin-bottom:8px}
    .lead{color:var(--muted);font-size:14px;margin-bottom:24px;line-height:1.5}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
    .card{
      background:#141414;border:1px solid #222;border-radius:10px;overflow:hidden;cursor:pointer;
      transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;
    }
    .card:hover{
      transform:translateY(-6px) scale(1.02);
      box-shadow:0 14px 32px rgba(0,0,0,.55),0 0 0 1px rgba(139,37,0,.35);
      border-color:rgba(139,37,0,.55);
    }
    .card img{width:100%;aspect-ratio:2/3;object-fit:cover;background:#222;display:block;transition:transform .35s ease}
    .card:hover img{transform:scale(1.04)}
    .card .t{padding:10px;font-size:12px;line-height:1.35}
    .back{display:inline-block;margin-bottom:20px;color:#fca5a5;font-size:14px;text-decoration:none}
    .back:hover{text-decoration:underline}
    .serie-hero{display:flex;gap:20px;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap}
    .poster-col{width:140px;flex-shrink:0}
    .hero-poster{width:100%;max-width:140px;height:auto;border-radius:10px;border:1px solid #333;display:block;margin:0}
    .serie-hero-main{flex:1;min-width:min(100%,200px);display:flex;flex-direction:column;align-items:stretch}
    .serie-hero-main h1{margin:0 0 10px;font-size:1.35rem;line-height:1.25}
    .user-score-wrap{
      display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;
      padding:12px 14px;
      background:linear-gradient(165deg,#1a1818 0%,#111 55%,#0d0d0d 100%);
      border:1px solid #2a2422;
      border-radius:14px;
      box-shadow:0 6px 20px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04);
    }
    .user-score{position:relative;width:54px;height:54px;flex-shrink:0}
    .user-score-svg{width:54px;height:54px;display:block}
    .user-score-disc{fill:#0f1513;stroke:none}
    .user-score-track{stroke:rgba(34,197,94,.28)}
    .user-score-fill{stroke:#22c55e;transition:stroke-dasharray .45s ease}
    .user-score-inner{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      pointer-events:none;
    }
    .score-value{
      display:inline-flex;align-items:baseline;justify-content:center;
      font-weight:800;color:#fff;font-size:14px;line-height:1;font-variant-numeric:tabular-nums;
    }
    .user-score-pct{
      font-size:0.5em;font-weight:700;opacity:.9;line-height:1;
      margin-left:1px;position:relative;top:-0.55em;
    }
    .user-score-label{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;text-align:center}
    .serie-hero .user-score-wrap{align-self:flex-start}
    .serie-hero-main .hero-text{
      margin:0 0 12px;padding:12px 14px;font-size:14px;line-height:1.55;color:var(--text);
      background:#141414;border:1px solid #2a2a2a;border-radius:10px;white-space:pre-wrap
    }
    .serie-hero-main .lead{margin:0;color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:0}
    .season{margin-bottom:28px;border:1px solid #2a2a2a;border-radius:12px;overflow:hidden;background:#111}
    .season h2{font-size:14px;padding:12px 16px;margin:0;background:#1a1a1a;border-bottom:1px solid #2a2a2a;color:#ddd}
    .season-head{display:flex;gap:14px;align-items:flex-start;padding:12px 16px;background:#1a1a1a;border-bottom:1px solid #2a2a2a}
    .season-poster{width:72px;flex-shrink:0;border-radius:8px;border:1px solid #333;object-fit:cover;aspect-ratio:2/3;background:#222}
    .season-head-text{flex:1;min-width:0}
    .season-head-text h2{font-size:14px;padding:0;margin:0 0 6px;background:none;border:none;color:#ddd}
    .season-note{font-size:12px;color:var(--muted);margin:0;line-height:1.45}
    .ep-list{display:flex;flex-direction:column}
    .ep{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #222;cursor:pointer;font-size:13px}
    .ep:last-child{border-bottom:none}
    .ep:hover{background:#1a1010}
    .ep-num{flex:0 0 52px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums}
    .ep-title{flex:1;color:#e5e5e5}
    .empty{color:var(--muted);padding:40px;text-align:center}
    footer{padding:24px;text-align:center;color:var(--muted);font-size:12px;border-top:1px solid #222;margin-top:40px}
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/watch/">Redwood Plus</a>
    <input type="search" class="nav-search" id="nav-q" placeholder="Rechercher une série…" autocomplete="off" />
    <div class="nav-end">
      <a href="/watch/">Accueil</a>
      <a href="/watch/serie.html">Séries</a>
      <a href="/watch/categories.html">Catégories</a>
      <div class="nav-user-wrap" id="nav-user-wrap">
        <button type="button" class="nav-user-trigger" id="nav-user-trigger" aria-expanded="false" aria-haspopup="true" aria-controls="nav-user-menu">
          <span class="nav-user-avatar" aria-hidden="true"><span id="nav-user-initials">…</span></span>
          <span class="nav-user-name" id="nav-user-name">…</span>
        </button>
        <div class="nav-user-menu" id="nav-user-menu" role="menu" hidden>
          <a href="/watch/settings.html" role="menuitem">Paramètres</a>
          <button type="button" class="nav-logout-btn" role="menuitem" id="nav-logout">Déconnexion</button>
        </div>
      </div>
    </div>
  </nav>
  <div id="watch-announcement" class="watch-announcement-host" hidden></div>
  <main id="main-list">
    <h1>Séries</h1>
    <div class="grid" id="series-grid"></div>
    <p class="empty" id="empty-list" style="display:none">Aucune série. Marquez des entrées comme « Épisode de série » dans l’administration.</p>
  </main>
  <main id="main-detail" style="display:none">
    <a class="back" href="/watch/serie.html">← Toutes les séries</a>
    <div class="serie-hero">
      <div class="poster-col">
        <img class="hero-poster" id="d-poster" alt="" />
      </div>
      <div class="serie-hero-main">
        <h1 id="d-title">…</h1>
        <p class="hero-text" id="d-hero-text" hidden></p>
        <p class="lead" id="d-syn"></p>
      </div>
      <div class="user-score-wrap" id="serie-score-wrap" hidden>
        <div class="user-score" id="serie-score-widget">
          <svg viewBox="0 0 36 36" class="user-score-svg" aria-hidden="true">
            <circle class="user-score-disc" cx="18" cy="18" r="13.35" />
            <circle class="user-score-track" cx="18" cy="18" r="15.915" pathLength="100" fill="none" stroke-width="3" />
            <circle id="serie-score-arc" class="user-score-fill" cx="18" cy="18" r="15.915" pathLength="100" fill="none" stroke-width="3" stroke-linecap="round" transform="rotate(-90 18 18)" stroke-dasharray="0 100" />
          </svg>
          <div class="user-score-inner">
            <span class="score-value"><span id="serie-score-num"></span><span class="user-score-pct">%</span></span>
          </div>
        </div>
        <span class="user-score-label">Score TMDB</span>
      </div>
    </div>
    <div id="seasons"></div>
  </main>
  <footer>© Redwood Plus — This product uses the TMDB API but is not endorsed or certified by TMDB.</footer>
  <script src="/watch/app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const key = params.get('key');

    function seriesListUrl(qTrim) {
      return '/watch/serie.html' + (qTrim ? '?q=' + encodeURIComponent(qTrim) : '');
    }

    function showList() {
      document.getElementById('main-list').style.display = 'block';
      document.getElementById('main-detail').style.display = 'none';
    }
    function showDetail() {
      document.getElementById('main-list').style.display = 'none';
      document.getElementById('main-detail').style.display = 'block';
    }

    async function bootList(q) {
      const needle = (q || '').trim();
      const url = '/api/series' + (needle ? '?q=' + encodeURIComponent(needle) : '');
      const rows = await apiJson(url);
      const g = document.getElementById('series-grid');
      const empty = document.getElementById('empty-list');
      const h1 = document.querySelector('#main-list h1');
      g.innerHTML = '';
      if (!rows.length) {
        empty.style.display = 'block';
        empty.textContent = needle
          ? 'Aucune série ne correspond à votre recherche.'
          : 'Aucune série. Marquez des entrées comme « Épisode de série » dans l’administration.';
        if (h1) h1.textContent = needle ? ('Résultats : « ' + needle + ' »') : 'Séries';
        return;
      }
      empty.style.display = 'none';
      if (h1) h1.textContent = needle ? ('Résultats : « ' + needle + ' »') : 'Séries';
      rows.forEach((s) => {
        const el = document.createElement('div');
        el.className = 'card';
        el.onclick = () => {
          location.href = '/watch/serie.html?key=' + encodeURIComponent(s.series_key);
        };
        const img = s.poster_path ? posterUrl(s.poster_path) : '';
        el.innerHTML = `<img src="${img}" alt="" loading="lazy" onerror="this.style.opacity=.25" /><div class="t"></div>`;
        const nEp = Number(s.episode_count) || 0;
        const nSe = Number(s.season_count) || 0;
        const epLabel = nEp === 1 ? '1 ép.' : nEp + ' ép.';
        const seLabel = nSe === 1 ? '1 saison' : nSe + ' saisons';
        el.querySelector('.t').textContent = s.title + ' · ' + epLabel + ' · ' + seLabel;
        g.appendChild(el);
      });
    }

    function applySerieTmdbScore(note) {
      const wrap = document.getElementById('serie-score-wrap');
      if (note == null || note === '') {
        wrap.hidden = true;
        return;
      }
      const n = Number(note);
      if (Number.isNaN(n)) {
        wrap.hidden = true;
        return;
      }
      const pct = Math.min(100, Math.max(0, Math.round(n * 10)));
      wrap.hidden = false;
      document.getElementById('serie-score-num').textContent = String(pct);
      document.getElementById('serie-score-arc').setAttribute('stroke-dasharray', pct + ' ' + (100 - pct));
      document.getElementById('serie-score-widget').setAttribute('aria-label', 'Score TMDB ' + pct + ' pour cent');
    }

    async function bootDetail(sk) {
      const d = await apiJson('/api/series/' + encodeURIComponent(sk) + '/detail');
      document.getElementById('d-title').textContent = d.title || sk;
      const heroEl = document.getElementById('d-hero-text');
      const heroRaw = (d.hero_text != null && String(d.hero_text).trim()) ? String(d.hero_text).trim() : '';
      if (heroRaw) {
        heroEl.hidden = false;
        heroEl.textContent = heroRaw;
      } else {
        heroEl.hidden = true;
        heroEl.textContent = '';
      }
      document.getElementById('d-syn').textContent = (d.synopsis || '').slice(0, 400) + (d.synopsis && d.synopsis.length > 400 ? '…' : '');
      const pu = d.poster_path ? posterUrl(d.poster_path) : '';
      document.getElementById('d-poster').src = pu;
      applySerieTmdbScore(d.note_tmdb);
      const wrap = document.getElementById('seasons');
      wrap.innerHTML = '';
      const seasonNums = Object.keys(d.seasons || {}).map((k) => parseInt(k, 10)).sort((a, b) => a - b);
      seasonNums.forEach((sn) => {
        const k = String(sn);
        const eps = d.seasons[k] || [];
        const sec = document.createElement('section');
        sec.className = 'season';
        const art = (d.season_art && d.season_art[k]) || {};
        const hasArt = !!(art.poster_path || art.note);
        if (hasArt) {
          const head = document.createElement('div');
          head.className = 'season-head';
          if (art.poster_path) {
            const img = document.createElement('img');
            img.className = 'season-poster';
            img.src = posterUrl(art.poster_path);
            img.alt = '';
            img.loading = 'lazy';
            img.onerror = function () { this.style.opacity = '0.25'; };
            head.appendChild(img);
          }
          const ht = document.createElement('div');
          ht.className = 'season-head-text';
          const h2 = document.createElement('h2');
          h2.textContent = 'Saison ' + k;
          ht.appendChild(h2);
          if (art.note) {
            const pn = document.createElement('p');
            pn.className = 'season-note';
            pn.textContent = art.note;
            ht.appendChild(pn);
          }
          head.appendChild(ht);
          sec.appendChild(head);
        } else {
          const h2 = document.createElement('h2');
          h2.textContent = 'Saison ' + k;
          sec.appendChild(h2);
        }
        const list = document.createElement('div');
        list.className = 'ep-list';
        sec.appendChild(list);
        eps.forEach((ep) => {
          const row = document.createElement('div');
          row.className = 'ep';
          row.onclick = () => { location.href = '/watch/film.html?id=' + ep.id; };
          const en = ep.episode_number != null ? ep.episode_number : '—';
          row.innerHTML = '<span class="ep-num">E' + String(en).padStart(2, '0') + '</span><span class="ep-title"></span>';
          row.querySelector('.ep-title').textContent = ep.titre || ('Épisode ' + en);
          list.appendChild(row);
        });
        wrap.appendChild(sec);
      });
    }

    let searchTimer;
    document.getElementById('nav-q').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const q = document.getElementById('nav-q').value.trim();
        if (key) {
          location.href = seriesListUrl(q);
          return;
        }
        history.replaceState(null, '', seriesListUrl(q));
        bootList(q).catch((e) => {
          if (e && e.message === '401') { location.href = '/login.html'; return; }
          console.error(e);
        });
      }, 280);
    });

    async function boot() {
      await apiJson('/api/auth/me');
      const listQ = (params.get('q') || '').trim();
      document.getElementById('nav-q').value = listQ;
      if (key) {
        showDetail();
        await bootDetail(key);
      } else {
        showList();
        await bootList(listQ);
      }
    }
    boot().catch((e) => {
      if (e && e.message === '401') { location.href = '/login.html'; return; }
      console.error(e);
      alert('Chargement impossible : ' + (e && e.message ? e.message : e));
    });
  </script>
</body>
</html>
