<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redwood Plus</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <style>
    :root { --bg:#0a0a0a; --accent:#8B2500; --text:#f5f5f5; --muted:#a3a3a3; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
    nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid #222;gap:16px;flex-wrap:wrap}
    a.brand,.brand{font-weight:800;color:var(--accent);letter-spacing:0.02em;text-decoration:none;font-size:clamp(1.35rem,2.5vw,1.85rem)}
    a.brand:hover{color:#fca5a5}
    .nav-mid{flex:1;display:flex;justify-content:center;min-width:200px;max-width:420px}
    .nav-search{width:100%;padding:9px 14px;border-radius:999px;border:1px solid #333;background:#111;color:#fff;font-size:14px}
    .nav-search::placeholder{color:#666}
    nav a{color:var(--muted);text-decoration:none;margin-left:18px;font-size:14px}
    nav a:hover{color:#fff}
    .hero{
      margin:24px 28px;padding:48px;border-radius:16px;border:1px solid #222;
      min-height:300px;display:flex;flex-direction:column;justify-content:flex-end;
      position:relative;overflow:hidden;
      background:linear-gradient(120deg,#1a0a0a,#0a0a0a);
      background-size:cover;background-position:center 20%;
    }
    .hero.has-backdrop{background-color:#0a0a0a}
    .hero-inner{position:relative;z-index:1}
    .hero h1{font-size:2rem;margin-bottom:8px;text-shadow:0 2px 24px rgba(0,0,0,.9),0 1px 3px #000}
    .hero p{color:#d4d4d4;max-width:560px;line-height:1.55;text-shadow:0 1px 12px rgba(0,0,0,.85)}
    .row-head{display:flex;align-items:center;justify-content:space-between;margin:28px 28px 12px;flex-wrap:wrap;gap:10px}
    .row-head h2{font-size:1rem;color:#ddd}
    .row-actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn-pick{padding:8px 14px;border-radius:999px;border:1px solid var(--accent);background:transparent;color:#fca5a5;font-size:13px;cursor:pointer;font-weight:600}
    .btn-pick:hover{background:rgba(139,37,0,.2)}
    .btn-save-tastes{padding:8px 14px;border-radius:999px;border:1px solid #444;background:#1a1a1a;color:#ccc;font-size:12px;cursor:pointer}
    .tastes{margin:0 28px 20px;padding:16px;border-radius:12px;border:1px solid #2a2a2a;background:#111}
    .tastes h3{font-size:13px;color:#888;margin-bottom:10px;font-weight:600}
    .taste-grid{display:flex;flex-wrap:wrap;gap:8px}
    .taste-grid label{font-size:12px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;padding:6px 10px;border-radius:8px;border:1px solid #333;background:#161616}
    .taste-grid input{accent-color:var(--accent)}
    .row-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 28px 28px;scroll-snap-type:x mandatory}
    .card{
      flex:0 0 160px;scroll-snap-align:start;background:#141414;border:1px solid #222;border-radius:10px;
      overflow:hidden;cursor:pointer;
      transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;
    }
    .card:hover{
      transform:translateY(-6px) scale(1.02);
      box-shadow:0 14px 32px rgba(0,0,0,.55),0 0 0 1px rgba(139,37,0,.35);
      border-color:rgba(139,37,0,.55);
    }
    .card-media{position:relative}
    .card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#222;transition:transform .35s ease}
    .card:hover img{transform:scale(1.04)}
    .badge-new{
      position:absolute;top:8px;left:8px;z-index:2;
      display:inline-flex;align-items:center;gap:4px;
      background:linear-gradient(135deg,#8B2500,#c94a1a);color:#fff;
      font-size:9px;font-weight:800;letter-spacing:.12em;
      padding:5px 9px;border-radius:6px;
      box-shadow:0 2px 10px rgba(0,0,0,.5);
    }
    .badge-new::before{content:'✦';font-size:10px;opacity:.95}
    .card .t{padding:8px 10px;font-size:12px;line-height:1.3}
    footer{padding:24px;text-align:center;color:var(--muted);font-size:12px;border-top:1px solid #222}
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/watch/">Redwood Plus</a>
    <div class="nav-mid">
      <input type="search" class="nav-search" id="nav-q" placeholder="Rechercher un film…" autocomplete="off" />
    </div>
    <div class="nav-end">
      <a href="/watch/">Accueil</a>
      <a href="/watch/serie.html">Séries</a>
      <a href="/watch/categories.html">Catégories</a>
      <div class="nav-user-wrap" id="nav-user-wrap">
        <button type="button" class="nav-user-trigger" id="nav-user-trigger" aria-expanded="false" aria-haspopup="true" aria-controls="nav-user-menu">
          <span class="nav-user-avatar" aria-hidden="true"><span id="nav-user-initials">…</span></span>
          <span class="nav-user-name" id="nav-user-name">…</span>
        </button>
        <div class="nav-user-menu" id="nav-user-menu" role="menu" hidden>
          <a href="/watch/settings.html" role="menuitem">Paramètres</a>
          <button type="button" class="nav-logout-btn" role="menuitem" id="nav-logout">Déconnexion</button>
        </div>
      </div>
    </div>
  </nav>
  <div id="watch-announcement" class="watch-announcement-host" hidden></div>
  <section class="hero" id="hero">
    <div class="hero-inner">
      <h1 id="hero-title">Chargement…</h1>
      <p id="hero-desc"></p>
    </div>
  </section>
  <div class="row-head">
    <h2 id="latest-head">Derniers ajouts</h2>
    <div class="row-actions">
      <button type="button" class="btn-pick" id="btn-surprise">Choisir pour moi</button>
      <button type="button" class="btn-save-tastes" id="btn-save-tastes">Enregistrer mes goûts</button>
    </div>
  </div>
  <div class="row-scroll" id="row-latest"></div>
  <section class="tastes" id="tastes-wrap">
    <h3>Mes genres préférés (pour « Choisir pour moi »)</h3>
    <div class="taste-grid" id="taste-grid"></div>
  </section>
  <div class="row-head"><h2>Séries</h2></div>
  <div class="row-scroll" id="row-series"></div>
  <div class="row-head"><h2>Tendances</h2></div>
  <div class="row-scroll" id="row-featured"></div>
  <footer>© Redwood Plus — This product uses the TMDB API but is not endorsed or certified by TMDB.</footer>
  <script src="/watch/app.js"></script>
  <script>
    function isNewTitle(f) {
      const raw = f.date_ajout || f.dateAjout;
      if (!raw) return false;
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return false;
      return (Date.now() - d.getTime()) / 864e5 <= 45;
    }

    function renderCards(container, list, opts) {
      const markNew = opts && opts.markNew;
      const latestTopN = opts && typeof opts.latestTopN === 'number' ? opts.latestTopN : null;
      container.innerHTML = '';
      list.forEach((f, i) => {
        const el = document.createElement('div');
        el.className = 'card';
        el.onclick = () => location.href = '/watch/film.html?id=' + f.id;
        const img = f.poster_path ? posterUrl(f.poster_path) : '';
        const showNew = markNew && (isNewTitle(f) || (latestTopN != null && i < latestTopN));
        const newBadge = showNew ? '<span class="badge-new">NEW</span>' : '';
        // Badge after <img> so it stacks above the poster (image would cover an earlier sibling).
        el.innerHTML = `<div class="card-media"><img src="${img}" alt="" loading="lazy" onerror="this.style.opacity=.3" />${newBadge}</div><div class="t"></div>`;
        el.querySelector('.t').textContent = f.titre;
        container.appendChild(el);
      });
    }

    let searchTimer;
    document.getElementById('nav-q').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(async () => {
        const q = document.getElementById('nav-q').value.trim();
        const url = '/api/films' + (q ? ('?q=' + encodeURIComponent(q)) : '');
        const rows = await apiJson(url);
        const row = document.getElementById('row-latest');
        document.getElementById('latest-head').textContent =
          q ? ('Résultats : « ' + q + ' »') : 'Derniers ajouts';
        renderCards(row, rows.slice(0, 24), {
          markNew: true,
          latestTopN: q ? 0 : 12,
        });
      }, 280);
    });

    document.getElementById('btn-surprise').addEventListener('click', async () => {
      try {
        const f = await apiJson('/api/films/surprise-me');
        location.href = '/watch/film.html?id=' + f.id;
      } catch (_) {}
    });

    document.getElementById('btn-save-tastes').addEventListener('click', async () => {
      const boxes = document.querySelectorAll('#taste-grid input:checked');
      const genres = Array.from(boxes).map(b => b.value);
      await apiJson('/api/auth/me/preferences', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ favorite_genres: genres }),
      });
      document.getElementById('btn-save-tastes').textContent = 'Enregistré ✓';
      setTimeout(() => { document.getElementById('btn-save-tastes').textContent = 'Enregistrer mes goûts'; }, 2000);
    });

    async function boot() {
      const me = await apiJson('/api/auth/me');
      const prefs = (me.preferences && me.preferences.favorite_genres) ? me.preferences.favorite_genres : [];

      const [featured, latest, genres] = await Promise.all([
        apiJson('/api/films/featured'),
        apiJson('/api/films/latest?limit=16'),
        apiJson('/api/films/genres-summary'),
      ]);

      const gEl = document.getElementById('taste-grid');
      gEl.innerHTML = '';
      genres.slice(0, 18).forEach(g => {
        const lab = document.createElement('label');
        const inp = document.createElement('input');
        inp.type = 'checkbox';
        inp.value = g.name;
        if (prefs.includes(g.name)) inp.checked = true;
        lab.appendChild(inp);
        lab.appendChild(document.createTextNode(' ' + g.name + ' '));
        const sp = document.createElement('span');
        sp.style.opacity = '0.5';
        sp.textContent = '(' + g.count + ')';
        lab.appendChild(sp);
        gEl.appendChild(lab);
      });

      const heroEl = document.getElementById('hero');
      if (featured.length) {
        const h = featured[0];
        document.getElementById('hero-title').textContent = h.titre;
        document.getElementById('hero-desc').textContent = (h.synopsis || '').slice(0, 220) + (h.synopsis && h.synopsis.length > 220 ? '…' : '');
        heroEl.style.cursor = 'pointer';
        heroEl.onclick = () => location.href = '/watch/film.html?id=' + h.id;
        const pu = h.poster_path ? posterUrl(h.poster_path) : '';
        if (pu) {
          heroEl.classList.add('has-backdrop');
          heroEl.style.backgroundImage =
            'linear-gradient(105deg,rgba(10,10,10,.93) 0%,rgba(10,10,10,.55) 42%,rgba(10,10,10,.25) 72%),' +
            'linear-gradient(180deg,rgba(10,10,10,.15) 0%,rgba(10,10,10,.88) 100%),' +
            "url('" + pu.replace(/'/g, "\\'") + "')";
        } else {
          heroEl.classList.remove('has-backdrop');
          heroEl.style.backgroundImage = '';
        }
      } else {
        document.getElementById('hero-title').textContent = 'Bienvenue';
        document.getElementById('hero-desc').textContent = 'Découvrez le catalogue ou demandez un titre au hasard selon vos goûts.';
        heroEl.classList.remove('has-backdrop');
        heroEl.style.backgroundImage = '';
        heroEl.style.cursor = '';
        heroEl.onclick = null;
      }

      renderCards(document.getElementById('row-latest'), latest, { markNew: true, latestTopN: 12 });
      renderCards(document.getElementById('row-featured'), featured);

      try {
        const series = await apiJson('/api/series');
        const rs = document.getElementById('row-series');
        rs.innerHTML = '';
        series.slice(0, 16).forEach((s) => {
          const el = document.createElement('div');
          el.className = 'card';
          el.onclick = () => { location.href = '/watch/serie.html?key=' + encodeURIComponent(s.series_key); };
          const img = s.poster_path ? posterUrl(s.poster_path) : '';
          el.innerHTML = `<div class="card-media"><img src="${img}" alt="" loading="lazy" onerror="this.style.opacity=.3" /></div><div class="t"></div>`;
          el.querySelector('.t').textContent = s.title + ' · ' + s.episode_count + ' ép.';
          rs.appendChild(el);
        });
      } catch (_) {}
    }
    boot().catch((e) => {
      if (e && e.message === '401') { location.href = '/login.html'; return; }
      console.error(e);
      alert('Chargement impossible : ' + (e && e.message ? e.message : e));
    });
  </script>
</body>
</html>
