<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Film — Redwood Plus</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <style>
    :root {
      --bg:#0a0a0a; --accent:#8B2500; --text:#f5f5f5; --muted:#a3a3a3;
      /* Plyr — align with Redwood Plus (accent + dark chrome) */
      --plyr-color-main: #8B2500;
      --plyr-video-background: #0a0a0a;
      --plyr-menu-background: rgba(20,20,20,.96);
      --plyr-menu-color: #f5f5f5;
      --plyr-menu-border-color: #333;
      --plyr-audio-control-color: #f5f5f5;
      --plyr-range-thumb-background: #8B2500;
      --plyr-range-fill-background: #8B2500;
      --plyr-range-track-background: #3f3f46;
      --plyr-tooltip-background: #8B2500;
      --plyr-tooltip-color: #fff;
      --plyr-badge-background: #8B2500;
      --plyr-badge-text-color: #fff;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
    nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid #222}
    a.brand,.brand{font-weight:800;color:var(--accent);text-decoration:none;font-size:clamp(1.35rem,2.5vw,1.85rem)}
    a.brand:hover{color:#fca5a5}
    nav a{color:var(--muted);text-decoration:none;margin-left:18px;font-size:14px}
    .backdrop{min-height:320px;background-size:cover;background-position:center;border-bottom:1px solid #222}
    .wrap{max-width:980px;margin:-80px auto 0;padding:0 24px 40px;position:relative}
    .hero-layout{display:flex;gap:22px;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap}
    .poster-col{width:180px;flex-shrink:0}
    .poster{width:100%;max-width:180px;height:auto;border-radius:12px;border:2px solid #222;display:block;margin:0}
    .title-row{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:12px 24px;margin-bottom:10px}
    .title-stack{flex:1;min-width:min(100%,220px)}
    .title-stack h1{margin-bottom:8px}
    .user-score-wrap{
      display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;
      padding:12px 14px 10px;
      background:linear-gradient(165deg,#1a1818 0%,#111 55%,#0d0d0d 100%);
      border:1px solid #2a2422;
      border-radius:14px;
      box-shadow:0 6px 20px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04);
    }
    .title-score{padding-top:2px}
    .user-score{position:relative;width:58px;height:58px;flex-shrink:0}
    .user-score-svg{width:58px;height:58px;display:block}
    .user-score-disc{fill:#0f1513;stroke:none}
    .user-score-track{stroke:rgba(34,197,94,.28)}
    .user-score-fill{stroke:#22c55e;transition:stroke-dasharray .45s ease}
    .user-score-inner{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      pointer-events:none;
    }
    .score-value{
      display:inline-flex;align-items:baseline;justify-content:center;
      font-weight:800;color:#fff;font-size:15px;line-height:1;font-variant-numeric:tabular-nums;
    }
    .user-score-pct{
      font-size:0.5em;font-weight:700;opacity:.9;line-height:1;
      margin-left:1px;position:relative;top:-0.55em;
    }
    .user-score-label{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;text-align:center}
    .hero-body{flex:1;min-width:220px}
    .hero-body .title-stack h1{font-size:1.6rem;line-height:1.2;margin-top:0}
    .meta{color:var(--muted);font-size:13px;margin-bottom:12px}
    .syno{color:#ddd;line-height:1.55;font-size:14px;margin-bottom:20px}
    .trailers{margin:8px 0 20px}
    .trailers-title{font-size:1rem;color:#ddd;margin-bottom:14px;font-weight:600}
    .trailer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .trailer-tile{background:#111;border:1px solid #2a2a2a;border-radius:10px;overflow:hidden}
    .trailer-tile iframe{width:100%;aspect-ratio:16/9;border:0;display:block;background:#000}
    .trailer-cap{padding:8px 10px;font-size:12px;color:var(--muted);line-height:1.35}
    .trailers-empty{margin:0;font-size:13px;color:var(--muted);line-height:1.5;max-width:52ch}
    .player-wrap{position:relative;max-width:100%;border-radius:12px;overflow:hidden;background:#0a0a0a;border:1px solid #2a2a2a;min-height:200px}
    .plyr--video{border-radius:12px}
    .plyr__control--overlaid{background:rgba(139,37,0,.92);color:#fff}
    .plyr__control--overlaid:hover,.plyr__control--overlaid:focus{background:#a32f00}
    .plyr__controls{background:linear-gradient(180deg,transparent,rgba(10,10,10,.94));padding:12px 10px 10px}
    .plyr__control{background:transparent;color:#e5e5e5}
    .plyr__control:hover{background:rgba(255,255,255,.08);color:#fff}
    .plyr__progress__buffer{background:rgba(255,255,255,.12)}
    .video-loader{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:linear-gradient(180deg,#141414,#0a0a0a);z-index:3;transition:opacity .35s ease, visibility .35s}
    .video-loader.done{opacity:0;visibility:hidden;pointer-events:none}
    .spinner{width:44px;height:44px;border-radius:50%;border:3px solid #333;border-top-color:var(--accent);animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .video-loader span{font-size:13px;color:var(--muted)}
    video{max-width:100%;border-radius:12px;background:#000;display:block;width:100%}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;align-items:center}
    .pill{padding:6px 10px;border-radius:999px;background:#1a1a1a;border:1px solid #333;font-size:12px}
    a.pill{color:inherit;text-decoration:none}
    a.pill:hover{border-color:var(--accent);color:#fca5a5}
    .series-bar{display:none;flex-wrap:wrap;gap:10px;margin:0}
    .similar{margin-top:32px}
    .similar h2{font-size:1rem;margin-bottom:12px}
    .cards{display:flex;gap:10px;overflow-x:auto}
    .c{
      flex:0 0 120px;background:#141414;border:1px solid #222;border-radius:8px;overflow:hidden;cursor:pointer;
      transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;
    }
    .c:hover{
      transform:translateY(-5px) scale(1.03);
      box-shadow:0 12px 28px rgba(0,0,0,.5),0 0 0 1px rgba(139,37,0,.35);
      border-color:rgba(139,37,0,.5);
    }
    .c img{transition:transform .35s ease}
    .c:hover img{transform:scale(1.06)}
    .c img{width:100%;aspect-ratio:2/3;object-fit:cover}
    .c .t{padding:6px 8px;font-size:11px}
    footer{padding:24px;text-align:center;color:var(--muted);font-size:12px;border-top:1px solid #222;margin-top:40px}
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/watch/">Redwood Plus</a>
    <div>
      <a href="/watch/">Accueil</a>
      <a href="/watch/serie.html">Séries</a>
      <a href="/watch/categories.html">Catégories</a>
      <a href="#" id="nav-logout">Déconnexion</a>
    </div>
  </nav>
  <div class="backdrop" id="backdrop"></div>
  <main class="wrap">
    <div class="hero-layout">
      <div class="poster-col">
        <img class="poster" id="poster" alt="" />
      </div>
      <div class="hero-body">
        <div class="title-row">
          <div class="title-stack">
            <h1 id="title">…</h1>
            <div class="series-bar" id="series-bar">
              <a class="pill" id="series-page-link" href="#">Série</a>
              <span class="pill" id="next-ep-hint" style="color:var(--muted);border-style:dashed"></span>
            </div>
          </div>
          <div class="user-score-wrap title-score" id="score-wrap" hidden>
            <div class="user-score" id="user-score-el">
              <svg viewBox="0 0 36 36" class="user-score-svg" aria-hidden="true">
                <circle class="user-score-disc" cx="18" cy="18" r="13.35" />
                <circle class="user-score-track" cx="18" cy="18" r="15.915" pathLength="100" fill="none" stroke-width="3" />
                <circle id="score-arc" class="user-score-fill" cx="18" cy="18" r="15.915" pathLength="100" fill="none" stroke-width="3" stroke-linecap="round" transform="rotate(-90 18 18)" stroke-dasharray="0 100" />
              </svg>
              <div class="user-score-inner">
                <span class="score-value"><span id="score-num"></span><span class="user-score-pct">%</span></span>
              </div>
            </div>
            <span class="user-score-label">Score TMDB</span>
          </div>
        </div>
        <div class="meta" id="meta"></div>
        <div class="syno" id="syno"></div>
      </div>
    </div>
    <section class="trailers" id="trailers-block" hidden>
      <h2 class="trailers-title">Bande-annonce</h2>
      <div class="trailer-grid" id="trailers"></div>
    </section>
    <div class="player-wrap">
      <div class="video-loader" id="vloader">
        <div class="spinner"></div>
        <span>Chargement de la vidéo…</span>
      </div>
      <!-- No crossorigin: presigned S3 URLs rarely send CORS headers; without it, cross-origin video still plays. -->
      <video id="player" playsinline controls></video>
    </div>
    <div class="row" id="actors"></div>
    <section class="similar">
      <h2>Autres films</h2>
      <div class="cards" id="sim"></div>
    </section>
  </main>
  <footer>© Redwood Plus — This product uses the TMDB API but is not endorsed or certified by TMDB.</footer>
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  <script src="/watch/app.js"></script>
  <script>
    document.getElementById('nav-logout').addEventListener('click', (e) => { e.preventDefault(); logout(); });
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    function applyTmdbScore(note) {
      const wrap = document.getElementById('score-wrap');
      if (note == null || note === '') {
        wrap.hidden = true;
        return;
      }
      const n = Number(note);
      if (Number.isNaN(n)) {
        wrap.hidden = true;
        return;
      }
      const pct = Math.min(100, Math.max(0, Math.round(n * 10)));
      wrap.hidden = false;
      document.getElementById('score-num').textContent = String(pct);
      document.getElementById('score-arc').setAttribute('stroke-dasharray', pct + ' ' + (100 - pct));
      document.getElementById('user-score-el').setAttribute('aria-label', 'Score TMDB ' + pct + ' pour cent');
    }

    function renderTrailers(f) {
      const block = document.getElementById('trailers-block');
      const grid = document.getElementById('trailers');
      grid.innerHTML = '';
      if (f.content_kind !== 'film') {
        block.hidden = true;
        return;
      }
      block.hidden = false;
      const list = f.trailers && f.trailers.length ? f.trailers : [];
      if (!list.length) {
        const p = document.createElement('p');
        p.className = 'trailers-empty';
        p.textContent = f.tmdb_id == null
          ? 'Aucune bande-annonce : renseignez un identifiant TMDB sur la fiche (administration) pour lier les vidéos TMDB.'
          : 'Aucune vidéo YouTube répertoriée sur TMDB pour ce film pour l’instant, ou la clé API TMDB n’est pas configurée côté serveur.';
        grid.appendChild(p);
        return;
      }
      list.forEach((t) => {
        const tile = document.createElement('div');
        tile.className = 'trailer-tile';
        const ifr = document.createElement('iframe');
        // No loading="lazy": multiple lazy iframes often stay blank until scroll; feels like "only one trailer".
        ifr.src = 'https://www.youtube.com/embed/' + encodeURIComponent(t.key) + '?rel=0&modestbranding=1';
        ifr.title = t.name || 'Bande-annonce';
        ifr.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
        ifr.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
        ifr.setAttribute('allowfullscreen', '');
        const cap = document.createElement('div');
        cap.className = 'trailer-cap';
        cap.textContent = t.name || '';
        tile.appendChild(ifr);
        tile.appendChild(cap);
        grid.appendChild(tile);
      });
    }

    async function boot() {
      await apiJson('/api/auth/me');
      if (!id) { location.href = '/watch/'; return; }
      const f = await apiJson('/api/films/' + id);
      document.getElementById('title').textContent = f.titre;
      const metaParts = [];
      if (f.playback && f.playback.season_number != null && f.playback.episode_number != null) {
        const st = f.playback.series_title || '';
        const s = f.playback.season_number;
        const e = f.playback.episode_number;
        metaParts.push((st ? st + ' · ' : '') + 'S' + s + 'E' + String(e).padStart(2, '0'));
      }
      metaParts.push(f.annee, f.duree_min ? f.duree_min + ' min' : '', f.realisateur);
      document.getElementById('meta').textContent = metaParts.filter(Boolean).join(' · ');
      const pb = f.playback;
      const sbar = document.getElementById('series-bar');
      if (pb && pb.series_key) {
        sbar.style.display = 'flex';
        const sl = document.getElementById('series-page-link');
        sl.href = '/watch/serie.html?key=' + encodeURIComponent(pb.series_key);
        const sn = pb.season_number != null ? pb.season_number : '?';
        const en = pb.episode_number != null ? pb.episode_number : '?';
        sl.textContent = (pb.series_title || 'Série') + ' — S' + sn + 'E' + String(en).padStart(2, '0');
        document.getElementById('next-ep-hint').textContent = pb.next_episode_id
          ? 'Fin → lecture de l’épisode suivant'
          : 'Dernier épisode de la saison / série';
      } else {
        sbar.style.display = 'none';
      }
      document.getElementById('syno').textContent = f.synopsis || '';
      const pu = f.poster_url || '';
      document.getElementById('poster').src = pu;
      document.getElementById('backdrop').style.backgroundImage = pu ? `linear-gradient(180deg,rgba(10,10,10,.2),#0a0a0a),url('${pu}')` : 'none';
      applyTmdbScore(f.note_tmdb);
      renderTrailers(f);
      const act = document.getElementById('actors');
      act.innerHTML = '';
      (f.acteurs || []).slice(0, 12).forEach(a => {
        const p = document.createElement('span');
        p.className = 'pill';
        p.textContent = a;
        act.appendChild(p);
      });

      const stream = await apiJson('/api/films/' + id + '/stream-url');
      const video = document.getElementById('player');
      const loader = document.getElementById('vloader');
      const hideLoader = () => loader.classList.add('done');
      video.addEventListener('loadeddata', hideLoader, { once: true });
      video.addEventListener('canplay', hideLoader, { once: true });
      video.addEventListener('error', () => {
        loader.querySelector('span').textContent = 'Lecture impossible (réseau ou fichier).';
      });
      video.src = stream.url;
      const player = new Plyr(video);
      player.on('ended', () => {
        if (f.playback && f.playback.next_episode_id) {
          location.href = '/watch/film.html?id=' + f.playback.next_episode_id;
        }
      });
      setTimeout(() => { if (video.readyState >= 2) hideLoader(); }, 8000);

      const films = await apiJson('/api/films');
      const sim = document.getElementById('sim');
      films.filter(x => String(x.id) !== String(id)).slice(0, 12).forEach(x => {
        const c = document.createElement('div');
        c.className = 'c';
        c.onclick = () => location.href = '/watch/film.html?id=' + x.id;
        const img = x.poster_path ? posterUrl(x.poster_path) : '';
        c.innerHTML = `<img src="${img}" alt="" loading="lazy" /><div class="t"></div>`;
        c.querySelector('.t').textContent = x.titre;
        sim.appendChild(c);
      });
    }
    boot().catch((e) => {
      if (e && e.message === '401') { location.href = '/login.html'; return; }
      console.error(e);
      alert('Lecture impossible : ' + (e && e.message ? e.message : e));
      location.href = '/watch/';
    });
  </script>
</body>
</html>
