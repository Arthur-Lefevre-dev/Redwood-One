<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catégories — Redwood Plus</title>
  <style>
    :root { --bg:#0a0a0a; --accent:#8B2500; --text:#f5f5f5; --muted:#a3a3a3; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
    nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid #222}
    .brand{font-weight:700;color:var(--accent)}
    nav a{color:var(--muted);text-decoration:none;margin-left:18px;font-size:14px}
    main{padding:24px 28px}
    h1{font-size:1.2rem;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
    .chip{padding:10px 12px;border-radius:10px;border:1px solid #333;cursor:pointer;font-size:13px;text-align:center}
    .chip:hover{border-color:var(--accent);color:var(--accent)}
    .list{margin-top:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
    .card{background:#141414;border:1px solid #222;border-radius:10px;overflow:hidden;cursor:pointer}
    .card img{width:100%;aspect-ratio:2/3;object-fit:cover;background:#222}
    .card .t{padding:8px 10px;font-size:12px}
    .search{width:100%;max-width:360px;padding:10px 12px;border-radius:8px;border:1px solid #333;background:#111;color:#fff;margin-bottom:16px}
    footer{padding:24px;text-align:center;color:var(--muted);font-size:12px;border-top:1px solid #222;margin-top:40px}
  </style>
</head>
<body>
  <nav>
    <div class="brand">Redwood Plus</div>
    <div>
      <a href="/watch/">Accueil</a>
      <a href="/watch/categories.html">Catégories</a>
      <a href="#" id="nav-logout">Déconnexion</a>
    </div>
  </nav>
  <main>
    <h1>Parcourir</h1>
    <input class="search" id="q" placeholder="Rechercher un titre…" />
    <div class="grid" id="genres"></div>
    <div class="list" id="films"></div>
  </main>
  <footer>© Redwood Plus — This product uses the TMDB API but is not endorsed or certified by TMDB.</footer>
  <script src="./app.js"></script>
  <script>
    document.getElementById('nav-logout').addEventListener('click', (e) => { e.preventDefault(); logout(); });
    const GENRES = ['Action','Comédie','Drame','Science-Fiction','Thriller','Horreur','Animation','Romance'];
    const gEl = document.getElementById('genres');
    GENRES.forEach(g => {
      const c = document.createElement('div');
      c.className = 'chip';
      c.textContent = g;
      c.onclick = () => loadGenre(g);
      gEl.appendChild(c);
    });

    async function loadAll(q) {
      const url = '/api/films' + (q ? ('?q=' + encodeURIComponent(q)) : '');
      const r = await api(url);
      const rows = await r.json();
      render(rows);
    }

    async function loadGenre(g) {
      const r = await api('/api/films/by-genre?genre=' + encodeURIComponent(g));
      const rows = await r.json();
      render(rows);
    }

    function render(rows) {
      const el = document.getElementById('films');
      el.innerHTML = '';
      rows.forEach(f => {
        const c = document.createElement('div');
        c.className = 'card';
        c.onclick = () => location.href = '/watch/film.html?id=' + f.id;
        const img = f.poster_path ? posterUrl(f.poster_path) : '';
        c.innerHTML = `<img src="${img}" alt="" loading="lazy" /><div class="t"></div>`;
        c.querySelector('.t').textContent = f.titre;
        el.appendChild(c);
      });
    }

    document.getElementById('q').addEventListener('input', () => {
      clearTimeout(window._t);
      window._t = setTimeout(() => loadAll(document.getElementById('q').value.trim()), 300);
    });

    api('/api/auth/me').then(() => loadAll('')).catch(() => location.href = '/login.html');
  </script>
</body>
</html>
