<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Administration — Redwood Plus</title>
    <link rel="stylesheet" href="/css/redwood-auth.css" />
</head>
<body>
  <div class="card">
    <h1>Administration</h1>
    <p class="sub">Connexion réservée aux comptes administrateur</p>
    <form id="f">
      <label for="u">Identifiant</label>
      <input id="u" name="username" autocomplete="username" required />
      <div class="pass-row">
        <label for="p">Mot de passe</label>
        <div class="pass-field">
          <input id="p" name="password" type="password" autocomplete="current-password" required />
          <button type="button" class="btn-show-pass" id="btn-show-pass" aria-pressed="false" aria-label="Afficher le mot de passe">
            <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit">Accéder au tableau de bord</button>
    </form>
    <p class="err" id="err"></p>
    <p class="links"><a href="/login.html">Espace spectateur</a></p>
  </div>
  <script>
    (function () {
      const inp = document.getElementById('p');
      const btn = document.getElementById('btn-show-pass');
      btn.addEventListener('click', () => {
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        btn.classList.toggle('is-revealed', show);
        btn.setAttribute('aria-pressed', show ? 'true' : 'false');
        btn.setAttribute('aria-label', show ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
      });
    })();
    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('err');
      err.style.display = 'none';
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          username: document.getElementById('u').value.trim(),
          password: document.getElementById('p').value,
        }),
      });
      if (!r.ok) {
        let j = null;
        try {
          j = await r.json();
        } catch (_) {}
        const d = j && j.detail;
        const inactive =
          d &&
          typeof d === 'object' &&
          !Array.isArray(d) &&
          d.code === 'account_inactive';
        if (inactive) {
          const u = new URL('/compte-desactive.html', window.location.origin);
          if (d.deactivated_at) u.searchParams.set('deactivated_at', d.deactivated_at);
          window.location.href = u.pathname + u.search;
          return;
        }
        err.textContent = 'Identifiants invalides';
        if (r.status === 429) {
          err.textContent = 'Trop de tentatives. Patientez une minute puis réessayez.';
        } else if (d && typeof d === 'string') {
          err.textContent = d;
        }
        err.style.display = 'block';
        return;
      }
      let j;
      try {
        j = await r.json();
      } catch (_) {
        err.textContent = 'Réponse serveur invalide.';
        err.style.display = 'block';
        return;
      }
      if (j.role !== 'admin') {
        err.textContent = 'Ce compte n’est pas administrateur. Utilisez la page spectateur.';
        err.style.display = 'block';
        return;
      }
      window.location.href = '/admin/';
    });
  </script>
</body>
</html>
