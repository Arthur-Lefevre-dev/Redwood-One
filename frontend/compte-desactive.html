<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compte désactivé — Redwood Plus</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --accent: #8b2500;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      text-align: center;
    }
    .deactivated-header {
      margin-bottom: 18px;
    }
    .hero-emoji {
      display: block;
      font-size: clamp(2.75rem, 14vw, 4.25rem);
      line-height: 1;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 1.25rem;
      margin: 0;
      font-weight: 600;
    }
    p { color: var(--muted); font-size: 0.9rem; line-height: 1.55; margin-bottom: 10px; }
    .date-line {
      color: var(--text);
      font-size: 0.95rem;
      margin: 16px 0 20px;
      padding: 12px 14px;
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .links { margin-top: 8px; font-size: 0.85rem; text-align: center; }
    a { color: #fca5a5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="deactivated-header">
      <span class="hero-emoji" aria-hidden="true">😢</span>
      <h1>Compte désactivé</h1>
    </div>
    <p>Ce compte ne peut plus se connecter. Si vous pensez qu’il s’agit d’une erreur, contactez un administrateur.</p>
    <div class="date-line" id="dateLine" aria-live="polite"></div>
    <p class="links"><a href="/login.html">Retour à la connexion</a></p>
  </div>
  <script>
    (function () {
      const raw = new URLSearchParams(window.location.search).get('deactivated_at');
      const el = document.getElementById('dateLine');
      if (!raw) {
        el.textContent = 'Date de désactivation : non renseignée.';
        return;
      }
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) {
        el.textContent = 'Date de désactivation : non renseignée.';
        return;
      }
      el.textContent =
        'Désactivé le : ' +
        d.toLocaleString('fr-FR', {
          dateStyle: 'long',
          timeStyle: 'short',
        });
    })();
  </script>
</body>
</html>
