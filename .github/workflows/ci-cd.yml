# CI: pytest on every push / PR to main.
# CD: SSH to VPS, git pull, docker compose build + up (main only, after tests pass).
#
# GitHub repo → Settings → Secrets and variables → Actions, add:
#   VPS_HOST      — e.g. 51.91.10.10 or vps.example.com
#   VPS_USER      — e.g. debian
#   VPS_SSH_KEY   — private key (full PEM, including BEGIN/END lines)
# Non-default SSH port: add under `with:` → port: 22
#
# On the VPS: clone repo to /opt/redwood (or set DEPLOY_ROOT in the SSH script below),
# ensure the deploy user can `git pull` (deploy key or HTTPS), and either:
#   - add user to group `docker`, or
#   - allow passwordless sudo for `docker` (simplest: keep USE_SUDO_DOCKER=1 in the workflow).

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    concurrency:
      group: redwood-deploy-production
      cancel-in-progress: true

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/redwood
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            export USE_SUDO_DOCKER=1
            chmod +x scripts/deploy-vps.sh
            ./scripts/deploy-vps.sh
